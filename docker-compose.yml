version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: mcpflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: .
    container_name: mcpflow-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      - GIN_MODE=release
    volumes:
      - ./configs/docker-config.yml:/app/configs/config.yml:ro

volumes:
  mongo_data:
